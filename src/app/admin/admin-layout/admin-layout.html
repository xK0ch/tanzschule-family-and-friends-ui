<mat-toolbar class="admin-toolbar">
  <span class="admin-title">Admin</span>
  <span class="toolbar-spacer"></span>
  <span class="admin-user">{{ authService.username() }}</span>
  <button mat-icon-button (click)="logout()" matTooltip="Abmelden">
    <mat-icon>logout</mat-icon>
  </button>
</mat-toolbar>

<mat-sidenav-container class="admin-container">
  <mat-sidenav mode="side" opened class="admin-sidenav">
    <mat-nav-list>
      <a mat-list-item routerLink="/admin/faq" routerLinkActive="active-link">
        <mat-icon matListItemIcon>help_outline</mat-icon>
        <span matListItemTitle>FAQ</span>
      </a>
      <a mat-list-item routerLink="/admin/gallery" routerLinkActive="active-link">
        <mat-icon matListItemIcon>photo_library</mat-icon>
        <span matListItemTitle>Galerie</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="admin-content">
    <router-outlet />
  </mat-sidenav-content>
</mat-sidenav-container>
