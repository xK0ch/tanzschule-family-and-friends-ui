<div class="page-container">
  <h1>Neuigkeiten</h1>

  @if (currentNews(); as news) {
    <div class="slideshow" (click)="openDetail(news)">
      <div class="slide">
        @if (news.image) {
          <img
            [src]="newsService.getImageUrl(news.id)"
            [alt]="news.title"
            class="slide-image" />
        }
        <div class="slide-overlay">
          <h2 class="slide-title">{{ news.title }}</h2>
          <p class="slide-hint">Klicken zum Lesen</p>
        </div>
      </div>

      @if (newsList().length > 1) {
        <button class="slide-arrow slide-prev" mat-icon-button (click)="prev($event)">
          <mat-icon>chevron_left</mat-icon>
        </button>
        <button class="slide-arrow slide-next" mat-icon-button (click)="next($event)">
          <mat-icon>chevron_right</mat-icon>
        </button>

        <div class="slide-dots">
          @for (item of newsList(); track item.id; let i = $index) {
            <button
              class="dot"
              [class.active]="i === currentIndex()"
              (click)="goTo(i, $event)">
            </button>
          }
        </div>
      }
    </div>
  } @else {
    <p class="empty-message">Aktuell gibt es keine Neuigkeiten.</p>
  }
</div>
